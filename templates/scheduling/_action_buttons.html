<div class="flex items-center justify-end gap-2">
    <form method="post" class="inline">
        {% csrf_token %}
        <input type="hidden" name="action" value="toggle_lock">
        <input type="hidden" name="tab" x-bind:value="tab">
        <input type="hidden" name="schedule_id" value="{{ sched.id }}">
        <button type="submit" class="p-1.5 rounded-md {% if sched.is_locked %}text-amber-600 hover:bg-amber-50:bg-amber-900/20{% else %}text-slate-400 hover:text-amber-600 hover:bg-amber-50:text-amber-400:bg-amber-900/20{% endif %} transition" title="{% if sched.is_locked %}Unlock{% else %}Lock{% endif %}">
            {% if sched.is_locked %}
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
            {% else %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
            {% endif %}
        </button>
    </form>
    
    {% if not sched.is_locked %}
    <button @click="showEditModal = true; editSchedId = '{{ sched.id }}'; editDate = '{{ sched.date|date:'Y-m-d' }}'; editStart = '{{ sched.start_time|time:'H:i' }}'; editEnd = '{{ sched.end_time|time:'H:i' }}';" class="p-1.5 rounded-md text-slate-400 hover:text-brand-600 hover:bg-brand-50:text-brand-400:bg-brand-900/20 transition" title="Edit">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
    </button>
    
    <form method="post" class="inline" onsubmit="return confirm('Are you sure you want to delete this schedule?');">
        {% csrf_token %}
        <input type="hidden" name="action" value="delete">
        <input type="hidden" name="tab" x-bind:value="tab">
        <input type="hidden" name="schedule_id" value="{{ sched.id }}">
        <button type="submit" class="p-1.5 rounded-md text-slate-400 hover:text-rose-600 hover:bg-rose-50:text-rose-400:bg-rose-900/20 transition" title="Delete">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
    </form>
    {% else %}
    <div class="p-1.5 w-[28px]"></div>
    <div class="p-1.5 w-[28px]"></div>
    {% endif %}
</div>
