databases:
  - name: ems-db
    databaseName: ems_db
    user: ems_user
    plan: free

services:
  - type: web
    name: ems-backend
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ems-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
